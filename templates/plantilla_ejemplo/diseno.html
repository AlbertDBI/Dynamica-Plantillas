<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo generado</title>
</head>
<body style="margin: 0; padding: 20px; font-family: Arial, Helvetica, sans-serif; font-size: 14px; line-height: 1.6; color: #333333; background-color: #f4f4f4;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <tr>
                        <td style="padding: 30px 40px;">
                            <!-- Saludo -->
                            <div style="margin-bottom: 20px;">
                                {{saludo}}
                            </div>

                            <!-- Cuerpo -->
                            <div style="text-align: justify; margin-bottom: 20px;">
                                {{cuerpo}}
                            </div>

                            <!-- Campo personalizado -->
                            <div style="background-color: #f0f7ff; border-left: 4px solid #007acc; padding: 15px; margin-bottom: 20px;">
                                {{personalizado}}
                            </div>

                            <!-- Despedida -->
                            <div style="margin-bottom: 30px;">
                                {{despedida}}
                            </div>

                            <!-- Firma -->
                            <div style="border-top: 1px solid #dddddd; padding-top: 20px; margin-top: 20px;">
                                {{firma}}
                            </div>

                            <!-- Texto obligatorio -->
                            <div style="font-size: 11px; color: #666666; text-align: justify; margin-top: 30px; padding-top: 15px; border-top: 1px solid #eeeeee;">
                                {{texto_obligatorio}}
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
