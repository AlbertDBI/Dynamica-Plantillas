<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1f2937;
      line-height: 1.6;
    }
    .wrapper {
      max-width: 640px;
      margin: 32px auto;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      padding: 28px 32px;
      color: #ffffff;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.85;
    }
    .body {
      padding: 32px;
    }
    .body p {
      margin: 0 0 16px;
    }
    .highlight-box {
      background-color: #eff6ff;
      border-left: 4px solid #2563eb;
      padding: 18px 20px;
      margin: 20px 0;
      border-radius: 0 8px 8px 0;
    }
    .highlight-box p:last-child {
      margin-bottom: 0;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e3a8a;
      margin: 24px 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    ul.benefits {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
    }
    ul.benefits li {
      padding: 8px 0 8px 28px;
      position: relative;
    }
    ul.benefits li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #2563eb;
      font-weight: bold;
    }
    .cta-box {
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      color: #ffffff;
      padding: 24px;
      border-radius: 10px;
      text-align: center;
      margin: 24px 0;
    }
    .cta-box a {
      display: inline-block;
      background-color: #ffffff;
      color: #1e3a8a;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 10px;
    }
    .sector-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }
    .sector-card {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
    }
    .sector-card strong {
      color: #1e3a8a;
      display: block;
      margin-bottom: 4px;
    }
    .footer {
      background-color: #f8fafc;
      padding: 24px 32px;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
      color: #64748b;
    }
    .signature-name {
      color: #0f172a;
      font-weight: 700;
      font-size: 15px;
    }
    .signature-role {
      color: #475569;
      margin-bottom: 8px;
    }
    .signature-line {
      margin: 3px 0;
    }
    @media (max-width: 520px) {
      .sector-grid {
        grid-template-columns: 1fr;
      }
      .body, .header, .footer {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Dynamica BI</h1>
      <p>Agents d'IA amb veu humana per a la teva empresa</p>
    </div>
    <div class="body">
      {{saludo}}
      {{cuerpo}}
      {{personalizado}}
      {{despedida}}
    </div>
    <div class="footer">
      {{firma}}
    </div>
  </div>
</body>
</html>
