<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1f2937;
      line-height: 1.6;
    }
    .wrapper {
      width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      background-color: #0f172a;
      padding: 24px 32px;
      color: #ffffff;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #93c5fd;
    }
    .body {
      padding: 32px;
      font-size: 15px;
    }
    .body p {
      margin: 0 0 16px;
    }
    .body ul {
      margin: 0 0 16px;
      padding-left: 24px;
    }
    .body li {
      margin: 6px 0;
    }
    .body strong {
      color: #1e3a8a;
    }
    .highlight-box {
      background-color: #eff6ff;
      border-left: 4px solid #2563eb;
      padding: 16px 20px;
      margin: 20px 0;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #1e3a8a;
      margin: 24px 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sector-card {
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 14px;
      vertical-align: top;
    }
    .sector-card strong {
      color: #1e3a8a;
      display: block;
      margin-bottom: 4px;
    }
    .cta-box {
      background-color: #1e3a8a;
      color: #ffffff;
      padding: 24px;
      border-radius: 8px;
      text-align: center;
      margin: 24px 0;
    }
    .cta-box p {
      margin: 0 0 12px;
    }
    .cta-box strong {
      color: #ffffff;
    }
    .footer {
      background-color: #f8fafc;
      padding: 24px 32px;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
      color: #64748b;
    }
    .footer p {
      margin: 4px 0;
    }
    .footer strong {
      color: #0f172a;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <table class="wrapper" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td class="header">
        <h1>Dynamica BI</h1>
        <p>Agents d'IA amb veu humana per a la teva empresa</p>
      </td>
    </tr>
    <tr>
      <td class="body">
        {{saludo}}
        {{cuerpo}}
        {{personalizado}}
        {{despedida}}
      </td>
    </tr>
    <tr>
      <td class="footer">
        {{firma}}
      </td>
    </tr>
  </table>
</body>
</html>
