<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #1f2937;
      line-height: 1.6;
    }
    .wrapper {
      max-width: 640px;
      margin: 32px auto;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .header {
      background-color: #0f172a;
      padding: 28px 32px;
      color: #ffffff;
    }
    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #93c5fd;
    }
    .email-body {
      padding: 32px;
    }
    .email-body p {
      margin: 0 0 16px;
    }
    .email-body ul {
      margin: 0 0 16px;
      padding-left: 24px;
    }
    .email-body li {
      margin: 6px 0;
    }
    .email-body blockquote {
      background-color: #eff6ff;
      border-left: 4px solid #2563eb;
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 0 8px 8px 0;
    }
    .email-body blockquote p:last-child {
      margin-bottom: 0;
    }
    .email-body strong {
      color: #1e3a8a;
    }
    .email-body hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 24px 0;
    }
    .footer {
      background-color: #f8fafc;
      padding: 24px 32px;
      border-top: 1px solid #e2e8f0;
      font-size: 13px;
      color: #64748b;
    }
    .footer p {
      margin: 4px 0;
    }
    .footer strong {
      color: #0f172a;
      font-size: 15px;
    }
    @media (max-width: 520px) {
      .email-body, .header, .footer {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Dynamica BI</h1>
      <p>Agents d'IA amb veu humana per a la teva empresa</p>
    </div>

    <div class="email-body">
      {{saludo}}
      {{cuerpo}}
      {{personalizado}}
      {{despedida}}
    </div>

    <div class="footer">
      {{firma}}
    </div>
  </div>
</body>
</html>
